# 网络设备
- name: Core-Firewall-01
  type: Security
  manufacturer: Huawei
  model: USG6000E
  serial_number: FW2023001
  ip_address: 192.168.1.1
  mac_address: 00:1A:1A:1A:1A:1A
  hostname: fw-core-01
  fqdn: fw-core-01.example.com
  subnet: 192.168.1.0/24
  vlan: 1
  gateway: 192.168.1.254
  site: DataCenter-A
  building: Building-A
  floor: 1F
  room: ServerRoom
  rack: Rack-A01
  rack_unit: U01-U04
  importance: critical
  environment: production
  business_unit: security
  owner: security-team@example.com
  cost_center: CC-001
  status: active
  os_type: VRP
  os_version: V500R005C20SPC500
  services:
    - firewall
    - vpn
    - ids
  open_ports:
    - 22/tcp
    - 443/tcp
    - 5001/udp
  config:
    ssh_port: 22
    snmp_community: public
    access_method: ssh

- name: Core-Switch-01
